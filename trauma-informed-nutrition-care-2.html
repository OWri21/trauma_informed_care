                      <div style={{ background: `linear-gradient(135deg, ${sc.color}, ${sc.color}aa)`, padding: "1.5rem 2rem", color: "white", display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: "1rem", flexWrap: "wrap" }}>
                        <div>
                          <div style={{ marginBottom: "0.5rem" }}>
                            <span style={{ background: "rgba(255,255,255,0.25)", padding: "0.2rem 0.7rem", borderRadius: "20px", fontSize: "0.75rem", fontWeight: 600 }}>{sc.tag}</span>
                          </div>
                          <h3 style={{ fontFamily: SERIF, fontSize: "1.35rem", fontWeight: 700, margin: 0 }}>Scenario {sc.id}: {sc.title}</h3>
                        </div>
                        <button onClick={() => setExpandedScenario(expandedScenario === i ? null : i)} style={{ background: "rgba(255,255,255,0.2)", border: "none", color: "white", borderRadius: "50%", width: "36px", height: "36px", fontSize: "1.2rem", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                          {expandedScenario === i ? "−" : "+"}
                        </button>
                      </div>
                      <div style={{ padding: "1.25rem 2rem 0" }}>
                        <p style={{ fontFamily: SANS, fontSize: "0.92rem", lineHeight: 1.7, color: "#444", margin: 0, fontStyle: "italic" }}>{sc.context}</p>
                      </div>
                      {expandedScenario === i && (
                        <div style={{ padding: "1.25rem 2rem 2rem" }}>
                          <h4 style={{ fontFamily: SERIF, fontSize: "1.05rem", color: C.slate, margin: "1.25rem 0 1rem" }}>Consultation Script</h4>
                          <div style={{ display: "flex", flexDirection: "column", gap: "0.8rem" }}>
                            {sc.script.map((line, j) => (
                              <div key={j} style={{ display: "flex", gap: "0.75rem", alignItems: "flex-start" }}>
                                <div style={{ width: "34px", height: "34px", borderRadius: "50%", background: line.spk === "D" ? C.teal : "#aaa", color: "white", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "0.75rem", fontWeight: 700, flexShrink: 0, marginTop: "2px" }}>{line.spk}</div>
                                <div style={{ flex: 1 }}>
                                  <div style={{ fontFamily: SANS, fontSize: "0.72rem", fontWeight: 700, color: line.spk === "D" ? C.teal : "#888", marginBottom: "0.25rem", textTransform: "uppercase", letterSpacing: "0.05em" }}>{line.name}</div>
                                  <div style={{ background: line.spk === "D" ? "#f0faf5" : C.cream, borderRadius: "10px", padding: "0.75rem 1rem", fontSize: "0.9rem", lineHeight: 1.65, color: "#222", borderLeft: `3px solid ${line.spk === "D" ? C.teal : "#ccc"}` }}>{line.text}</div>
                                  {line.note && (
                                    <div style={{ background: "#fffaec", border: `1px solid ${C.gold}55`, borderRadius: "8px", padding: "0.5rem 0.85rem", marginTop: "0.4rem", fontSize: "0.82rem", color: "#6b4c0a", lineHeight: 1.55 }}>✍️ {line.note}</div>
                                  )}
                                </div>
                              </div>
                            ))}
                          </div>
                          <div style={{ background: `${sc.color}10`, borderRadius: "12px", padding: "1.1rem 1.25rem", marginTop: "1.5rem", borderLeft: `4px solid ${sc.color}` }}>
                            <div style={{ fontFamily: SANS, fontSize: "0.75rem", fontWeight: 700, color: sc.color, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: "0.6rem" }}>✓ Key Techniques</div>
                            <div style={{ display: "flex", flexWrap: "wrap", gap: "0.5rem" }}>
                              {sc.techniques.map((t, j) => (
                                <span key={j} style={{ background: `${sc.color}18`, color: sc.color, borderRadius: "20px", padding: "0.25rem 0.8rem", fontSize: "0.82rem", fontWeight: 500 }}>{t}</span>
                              ))}
                            </div>
                          </div>
                          <div style={{ background: "#fffbea", border: "1px solid #f0c040", borderRadius: "12px", padding: "1rem 1.25rem", marginTop: "0.85rem", display: "flex", gap: "0.75rem", alignItems: "flex-start" }}>
                            <span>🤔</span>
                            <p style={{ fontFamily: SANS, fontSize: "0.88rem", lineHeight: 1.6, color: "#555", margin: 0 }}><strong>Reflective Question:</strong> {sc.reflection}</p>
                          </div>
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* LANGUAGE GUIDE */}
            {activeTab === "language" && (
              <div>
                <SectionHeader title="Language Guide" subtitle="Words carry weight — especially for trauma survivors. What to say, what to avoid, and why." />
                <div style={{ display: "flex", gap: "0.75rem", margin: "1.5rem 0 1.75rem" }}>
                  {[["avoid", "❌ Avoid This Language", C.rose], ["use", "✓ Use This Language", C.teal]].map(([id, label, color]) => (
                    <button key={id} onClick={() => setLangView(id)} style={{ flex: 1, padding: "0.85rem 1rem", border: `2px solid ${langView === id ? color : C.border}`, borderRadius: "12px", background: langView === id ? color : "white", color: langView === id ? "white" : C.fog, fontFamily: SANS, fontWeight: 600, fontSize: "0.9rem", cursor: "pointer", transition: "all 0.2s" }}>
                      {label}
                    </button>
                  ))}
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: "0.85rem" }}>
                  {(langView === "avoid" ? languageGuide.avoid : languageGuide.use).map((item, i) => (
                    <div key={i} style={{ background: "white", borderRadius: "14px", padding: "1.25rem 1.5rem", boxShadow: "0 3px 12px rgba(74,63,58,0.06)", borderLeft: `5px solid ${langView === "avoid" ? C.rose : C.teal}` }}>
                      <div style={{ fontFamily: SERIF, fontSize: "1.05rem", fontWeight: 600, color: langView === "avoid" ? C.rose : C.teal, marginBottom: "0.5rem" }}>{item.phrase}</div>
                      <div style={{ fontFamily: SANS, fontSize: "0.88rem", color: "#555", lineHeight: 1.6 }}>{item.why}</div>
                    </div>
                  ))}
                </div>
                <div style={{ marginTop: "2rem", background: C.slate, borderRadius: "16px", padding: "1.75rem 2rem", color: "white" }}>
                  <h3 style={{ fontFamily: SERIF, fontSize: "1.3rem", margin: "0 0 1rem", color: C.peach }}>🌿 The Underlying Principle</h3>
                  <p style={{ fontFamily: SANS, fontSize: "0.92rem", lineHeight: 1.75, opacity: 0.9, margin: 0 }}>
                    Trauma-informed language consistently does three things: it <strong style={{ color: C.peach }}>returns agency</strong> to the patient, it <strong style={{ color: C.peach }}>removes shame</strong> from the interaction, and it <strong style={{ color: C.peach }}>validates experience</strong> before moving toward change. Every phrase in the "avoid" column either removes agency, applies shame, or invalidates experience — often unintentionally. The goal is not perfect language, but a sustained orientation toward safety and respect.
                  </p>
                </div>
              </div>
            )}

            {/* SELF-CARE */}
            {activeTab === "selfcare" && (
              <div>
                <SectionHeader title="Practitioner Self-Care" subtitle="Working with trauma-affected populations has a cumulative impact on the clinician — this is not optional reading" />
                <div style={{ background: `${C.dusty}15`, border: `1px solid ${C.dusty}40`, borderRadius: "14px", padding: "1.25rem 1.5rem", margin: "1.5rem 0" }}>
                  <p style={{ fontFamily: SANS, fontSize: "0.9rem", color: C.clay, margin: 0, lineHeight: 1.7 }}>
                    <strong>A note to students:</strong> The expectation that you simply "manage" the emotional impact of this work without support is itself a trauma. The dietetics profession is beginning to take clinician wellbeing more seriously — but you don't need to wait for the system to catch up. Start building these practices now.
                  </p>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: "1rem" }}>
                  {selfCareData.map((s, i) => (
                    <div key={i} style={{ background: "white", borderRadius: "16px", overflow: "hidden", boxShadow: "0 4px 16px rgba(74,63,58,0.07)" }}>
                      <button onClick={() => setExpandedSelfCare(expandedSelfCare === i ? null : i)} style={{ width: "100%", padding: "1.2rem 1.5rem", background: expandedSelfCare === i ? s.color : `${s.color}15`, border: "none", textAlign: "left", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        <div style={{ display: "flex", gap: "0.8rem", alignItems: "center" }}>
                          <span style={{ fontSize: "1.5rem" }}>{s.icon}</span>
                          <h3 style={{ fontFamily: SERIF, fontSize: "1.1rem", fontWeight: 600, color: expandedSelfCare === i ? "white" : s.color, margin: 0 }}>{s.title}</h3>
                        </div>
                        <span style={{ color: expandedSelfCare === i ? "white" : s.color, fontSize: "1.2rem", fontWeight: "bold" }}>{expandedSelfCare === i ? "−" : "+"}</span>
                      </button>
                      {expandedSelfCare === i && (
                        <div style={{ padding: "1.5rem" }}>
                          <p style={{ fontFamily: SANS, fontSize: "0.92rem", lineHeight: 1.7, color: "#444", marginBottom: "1.25rem" }}>{s.content}</p>
                          <div style={{ background: `${s.color}0d`, borderRadius: "10px", padding: "1.1rem 1.25rem", borderLeft: `4px solid ${s.color}` }}>
                            <div style={{ fontFamily: SANS, fontSize: "0.75rem", fontWeight: 700, color: s.color, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: "0.6rem" }}>What You Can Do</div>
                            {s.actions.map((a, j) => (
                              <div key={j} style={{ display: "flex", gap: "0.6rem", marginBottom: j < s.actions.length - 1 ? "0.55rem" : 0, alignItems: "flex-start" }}>
                                <span style={{ color: s.color, marginTop: "2px", flexShrink: 0 }}>→</span>
                                <p style={{ fontFamily: SANS, fontSize: "0.88rem", lineHeight: 1.6, color: "#333", margin: 0 }}>{a}</p>
                              </div>
                            ))}
                          </div>
                        </div>
                      )}
                    </div>
                  ))}
                </div>
                <div style={{ marginTop: "2rem", background: C.slate, borderRadius: "16px", padding: "1.75rem 2rem", color: "white" }}>
                  <h3 style={{ fontFamily: SERIF, fontSize: "1.25rem", margin: "0 0 1rem", color: C.peach }}>📞 Support for You as a Practitioner</h3>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(240px, 1fr))", gap: "0.75rem" }}>
                    {[{ name: "Lifeline (24hr crisis)", num: "13 11 14" }, { name: "Beyond Blue", num: "1300 22 4636" }, { name: "EAP (ask your workplace)", num: "Confidential counselling" }, { name: "APS Psychologist Referral", num: "1800 333 497" }].map((r, i) => (
                      <div key={i} style={{ background: "rgba(255,255,255,0.08)", borderRadius: "10px", padding: "0.9rem 1.1rem" }}>
                        <div style={{ fontFamily: SANS, fontWeight: 600, fontSize: "0.88rem", color: C.peach, marginBottom: "0.25rem" }}>{r.name}</div>
                        <div style={{ fontFamily: SANS, fontSize: "0.85rem", color: "rgba(255,255,255,0.75)" }}>{r.num}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* REFERENCES */}
            {activeTab === "references" && (
              <div>
                <div style={{ marginBottom: "0.5rem" }}>
                  <h2 style={{ fontFamily: SERIF, fontSize: "clamp(1.6rem, 3vw, 2.2rem)", color: C.slate, margin: "0 0 0.5rem", fontWeight: 700 }}>References</h2>
                  <p style={{ fontFamily: SANS, fontSize: "0.95rem", color: C.fog, margin: 0, lineHeight: 1.6 }}>Sources underpinning the content of this resource, organised by topic. All citations are in APA 7th edition format.</p>
                </div>
                <div style={{ background: `${C.terra}15`, border: `1px solid ${C.terra}40`, borderRadius: "12px", padding: "1rem 1.25rem", margin: "1.25rem 0" }}>
                  <p style={{ fontFamily: SANS, fontSize: "0.88rem", color: C.clay, margin: 0, lineHeight: 1.65 }}><strong>Note on scope:</strong> This resource draws on established trauma science, motivational interviewing research, and healthcare implementation literature. The dietetics-specific evidence base for trauma-informed practice is growing but remains limited — practitioners are encouraged to engage with the broader TIC literature and apply it critically to their context.</p>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: "1rem", marginTop: "1rem" }}>
                  {references.map((cat, i) => (
                    <div key={i} style={{ background: "white", borderRadius: "16px", overflow: "hidden", boxShadow: "0 4px 16px rgba(74,63,58,0.07)" }}>
                      <button onClick={() => setExpandedRef(expandedRef === i ? null : i)} style={{ width: "100%", padding: "1.1rem 1.5rem", background: expandedRef === i ? cat.color : `${cat.color}15`, border: "none", textAlign: "left", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        <div style={{ display: "flex", gap: "0.8rem", alignItems: "center" }}>
                          <span style={{ fontSize: "1.4rem" }}>{cat.icon}</span>
                          <h3 style={{ fontFamily: SERIF, fontSize: "1.05rem", fontWeight: 600, color: expandedRef === i ? "white" : cat.color, margin: 0 }}>{cat.category}</h3>
                        </div>
                        <span style={{ color: expandedRef === i ? "white" : cat.color, fontSize: "1.2rem", fontWeight: "bold" }}>{expandedRef === i ? "−" : "+"}</span>
                      </button>
                      {expandedRef === i && (
                        <div style={{ padding: "1.25rem 1.5rem", display: "flex", flexDirection: "column", gap: "1rem" }}>
                          {cat.items.map((item, j) => (
                            <div key={j} style={{ background: C.cream, borderRadius: "10px", padding: "1rem 1.25rem", borderLeft: `4px solid ${cat.color}` }}>
                              <p style={{ fontFamily: SANS, fontSize: "0.88rem", lineHeight: 1.7, color: C.slate, margin: "0 0 0.5rem" }}>{item.citation}</p>
                              {item.note && <p style={{ fontFamily: SANS, fontSize: "0.82rem", color: C.fog, margin: "0 0 0.4rem", lineHeight: 1.6, fontStyle: "italic" }}>{item.note}</p>}
                              {item.url && <a href={item.url} target="_blank" rel="noopener noreferrer" style={{ fontFamily: SANS, fontSize: "0.8rem", color: cat.color, textDecoration: "none", fontWeight: 500 }}>↗ Access resource</a>}
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
                <div style={{ marginTop: "2rem", background: C.slate, borderRadius: "16px", padding: "1.75rem 2rem", color: "white" }}>
                  <h3 style={{ fontFamily: SERIF, fontSize: "1.2rem", margin: "0 0 0.75rem", color: C.peach }}>Further Reading</h3>
                  <p style={{ fontFamily: SANS, fontSize: "0.88rem", lineHeight: 1.7, opacity: 0.85, margin: "0 0 1rem" }}>For practitioners seeking to deepen their TIC practice, the following are particularly recommended:</p>
                  {[
                    "Van der Kolk (2014) — The Body Keeps the Score: accessible, comprehensive, essential.",
                    "Miller & Rollnick (2013) — Motivational Interviewing: the definitive MI guide, now in its third edition.",
                    "SAMHSA (2014) — freely available online; the source document for the 6 principles.",
                    "Ogden, Minton & Pain (2006) — Trauma and the Body: for those wanting a deeper somatic framework.",
                    "Figley (1995) — Compassion Fatigue: read before you experience it, not after.",
                  ].map((item, i) => (
                    <div key={i} style={{ display: "flex", gap: "0.6rem", marginBottom: "0.5rem", alignItems: "flex-start" }}>
                      <span style={{ color: C.peach, flexShrink: 0 }}>→</span>
                      <span style={{ fontFamily: SANS, fontSize: "0.87rem", color: "rgba(255,255,255,0.85)", lineHeight: 1.6 }}>{item}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

          </main>

          <footer style={{ textAlign: "center", padding: "2rem", fontFamily: SANS, fontSize: "0.82rem", color: C.fog, borderTop: `1px solid ${C.border}`, marginTop: "2rem" }}>
            This resource is for professional development purposes. If you or a patient are in crisis, please contact the appropriate services. Trauma-informed care is a framework, not a substitute for specialist mental health support.
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
